name: Build a nasazení webu

# Kdy se má spustit
on:
  schedule:
    # Každý den v 05:00 UTC = cca 07:00 ráno v ČR (léto 07:00, zima 06:00).
    # Chceš jiný čas? Změň jen tu první číslici (hodina v UTC).
    - cron: "0 5 * * *"
  # Umožní spustit ručně tlačítkem "Run workflow" v záložce Actions:
  workflow_dispatch:

# Oprávnění nutná pro nasazení na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Ať neběží dvě nasazení najednou
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Stáhnout repozitář
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Nainstalovat závislosti
        run: pip install -r requirements.txt

      # Uchová překladovou cache mezi dny, ať se stejné zprávy nepřekládají znovu
      - name: Obnovit překladovou cache
        uses: actions/cache@v4
        with:
          path: preklady_cache.json
          key: preklady-${{ github.run_id }}
          restore-keys: |
            preklady-

      - name: Vygenerovat web
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generuj_web.py

      # Do složky "public" dáme jen hotové stránky (ne zdrojové skripty)
      - name: Připravit složku k publikování
        run: |
          mkdir -p public
          cp index.html data.html data.json public/
          echo "dennibriefing.cz" > public/CNAME

      - name: Nahrát artefakt pro Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Nasadit na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build a nasazení webu

# Kdy se má spustit
on:
  schedule:
    # Každý den v 06:30 UTC = 08:30 v ČR v létě (v zimě 07:30).
    # Pozn.: GitHub plánované běhy někdy spouští s ~15–60min zpožděním.
    - cron: "30 6 * * *"
  # Umožní spustit ručně tlačítkem "Run workflow" v záložce Actions:
  workflow_dispatch:

# Oprávnění nutná pro nasazení na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Ať neběží dvě nasazení najednou
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Pojistka: kdyby se cokoli zaseklo, běh se ukončí po 25 minutách
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Stáhnout repozitář
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Nainstalovat závislosti
        run: pip install -r requirements.txt

      # Uchová překladovou cache mezi dny, ať se stejné zprávy nepřekládají znovu
      - name: Obnovit překladovou cache
        uses: actions/cache@v4
        with:
          path: preklady_cache.json
          key: preklady-${{ github.run_id }}
          restore-keys: |
            preklady-

      # Uchová archiv minulých vydání (proti opakování témat)
      - name: Obnovit archiv vydání
        uses: actions/cache@v4
        with:
          path: archiv
          key: archiv-${{ github.run_id }}
          restore-keys: |
            archiv-

      - name: Vygenerovat web
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generuj_web.py

      # Do složky "public" dáme jen hotové stránky (ne zdrojové skripty)
      - name: Připravit složku k publikování
        run: |
          mkdir -p public
          cp index.html data.html data.json public/
          if [ -d trhy_data ]; then cp -r trhy_data public/; fi
          echo "dennibriefing.cz" > public/CNAME

      - name: Nahrát artefakt pro Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Nasadit na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
